name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (format + lint)
        run: pnpm biome check .

      - name: ESLint (accessibility + module boundaries)
        run: pnpm nx run-many -t lint --no-tui -- --verbose

      - name: Stylelint
        run: pnpm stylelint "apps/**/*.css" "libs/**/*.css"

      - name: TypeScript typecheck
        run: pnpm nx run-many -t typecheck

      - name: Knip (unused exports/deps)
        run: pnpm knip

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        run: pnpm vitest run --coverage --config apps/a11y-road/vitest.config.ts

      - name: Upload coverage
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: vitest-coverage
          path: coverage/apps/a11y-road/

  e2e:
    name: E2E Tests
    if: false # Skipped until shadcn migration and responsive work are complete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm playwright test --config apps/maple-valley-health-e2e/playwright.config.ts --project chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: playwright-report
          path: apps/maple-valley-health-e2e/playwright-report/
